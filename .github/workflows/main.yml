on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

name: main
jobs:
  run_action:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6.0.2
        with:
          persist-credentials: false

      - run: npm ci

      - run: npm run lint

      - run: npm run build
