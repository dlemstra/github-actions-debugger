on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

name: main
jobs:
  run_action:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 #v6.0.3
        with:
          persist-credentials: false

      - run: npm ci

      - run: npm run lint

      - run: npm run build
